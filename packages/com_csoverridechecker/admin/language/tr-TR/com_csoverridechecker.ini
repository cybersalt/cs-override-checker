COM_CSOVERRIDECHECKER_DASHBOARD_ACTION_AUTOSCAN_TOOLTIP_NOKEY="Otomatik taramaları etkinleştirmek için önce Seçenekler panelinde Anthropic API anahtarınızı kaydedin. O zamana kadar Yöntem 1'i kullanın."
COM_CSOVERRIDECHECKER_DASHBOARD_RESCAN_TOOLTIP="Etkinleştirilmiş her şablonu yeniden tarayıp geçersiz kılma izleyicisini yeniden oluşturur. Joomla dışında şablon dosyalarını düzenledikten sonra veya Joomla'nın izleyicisi güncel değilse kullanın."

COM_CSOVERRIDECHECKER_CONFIG_AI_FIELDSET_LABEL="Anahtarlar &amp; jetonlar"
COM_CSOVERRIDECHECKER_CONFIG_AI_FIELDSET_DESC="İsteğe bağlı. Eklentinin taramaları otomatik olarak çalıştırabilmesi için buraya bir Anthropic API anahtarı kaydedin — Claude'a kopyala-yapıştır komut istemi gerekmez. Kontrol panelindeki manuel claude.ai / Claude Code iş akışını kullanmaya devam etmek için boş bırakın."
COM_CSOVERRIDECHECKER_CONFIG_ANTHROPIC_API_KEY_LABEL="Anthropic API anahtarı"
COM_CSOVERRIDECHECKER_CONFIG_ANTHROPIC_API_KEY_DESC="Kişisel Anthropic API anahtarınız (<code>sk-ant-…</code> ile başlar). Bir tane <a href=\"https://console.anthropic.com/\" target=\"_blank\" rel=\"noopener\">console.anthropic.com</a> adresinden alabilirsiniz. Anahtar bu sunucuda saklanır ve yalnızca sizin adınıza api.anthropic.com'u çağırmak için kullanılır. Bir anahtar kayıtlıyken, Kontrol Paneli; geçersiz kılma incelemesini sunucu tarafında Claude'a devreden ve raporu bir oturum olarak geri kaydeden bir <em>Otomatik tarama çalıştır</em> düğmesi sunar — kopyala-yapıştır gerekmez."
COM_CSOVERRIDECHECKER_CONFIG_ANTHROPIC_API_KEY_NOTE="Her otomatik tarama, anahtarınızla bir Anthropic API çağrısı yapar. Fiyatlandırma, kullanılan model için Anthropic'in talep ettiği ücrettir (varsayılan: Claude Sonnet 4.6). Çok fazla geçersiz kılması olan siteler her çalıştırmada ilk 60 ile sınırlandırılır; geri kalanı için yeniden çalıştırın veya sınırsız boyut için kontrol panelindeki manuel Claude Code iş akışını kullanın."

COM_CSOVERRIDECHECKER_CONFIG_SCAN_MODEL_LABEL="Tarama modeli"
COM_CSOVERRIDECHECKER_CONFIG_SCAN_MODEL_DESC="Kontrol panelindeki tek seferlik <em>Otomatik tarama çalıştır</em> çağrısı için kullanılan Claude modeli. Tarama bir sınıflandırma görevidir (her bulgu için alert / review / info). <strong>Opus varsayılandır</strong> &mdash; en kapsamlı inceleme ve ince yargı gerektiren bulgular için en güvenli sınıflandırıcı. Sonnet rutin taramaları maliyetin bir kısmına iyi şekilde yönetir; Haiku en ucuz seçenektir ve küçük sitelerde düşük riskli taramalar için uygundur."

COM_CSOVERRIDECHECKER_CONFIG_CHAT_MODEL_LABEL="Sohbet modeli"
COM_CSOVERRIDECHECKER_CONFIG_CHAT_MODEL_DESC="Oturum detay sayfasındaki Claude ile sohbet takibi için kullanılan Claude modeli (Claude'dan düzeltmeleri uygulamasını veya bulguları kapatmasını istediğiniz yer). Araç kullanımı sınıflandırmadan daha zorludur. <strong>Opus varsayılandır</strong> &mdash; en güvenilir araç kullanım davranışı ve yanlış uygulanan düzeltme riski en düşük seçim. Sonnet, düşük riskli takiplerin çok olduğu siteler için iyi bir orta yoldur; Haiku, çok adımlı araç dizilerinde zorlanabilir ve maliyet en yüksek öncelik olmadıkça sohbet modeli için önerilmez."

COM_CSOVERRIDECHECKER_CONFIG_JOOMLA_API_TOKEN_LABEL="Joomla API jetonu (kontrol paneli komut istemi için)"
COM_CSOVERRIDECHECKER_CONFIG_JOOMLA_API_TOKEN_DESC="İsteğe bağlı. <em>Sistem &rarr; Kullanıcılar &rarr; Profilim &rarr; Joomla API Jetonu</em> bölümünden bir Joomla API jetonu oluşturun ve buraya yapıştırın. Kontrol panelinin tarama / düzeltme komut istemleri jetonu &ldquo;PASTE YOUR JOOMLA API TOKEN HERE&rdquo; yer tutucusunun yerine otomatik olarak doldurur, böylece düzenleme yapmadan doğrudan Claude'a kopyalayıp yapıştırabilirsiniz.<br><br><strong>Çoklu yönetici uyarısı:</strong> Joomla API jetonları <em>onları oluşturan kullanıcı olarak</em> kimlik doğrular. Bu kontrol panelini birden fazla yönetici kullanıyorsa, komut istemi burada kaydedilen jetonu kullanacaktır &mdash; yani Claude API'yi o tek kullanıcı olarak çağıracaktır. Her yöneticinin kendi jetonunu kullanım anında yapıştırması için boş bırakın."

COM_CSOVERRIDECHECKER_CONFIG_SCAN_MAX_OVERRIDES_LABEL="Tarama başına geçersiz kılma sayısı"
COM_CSOVERRIDECHECKER_CONFIG_SCAN_MAX_OVERRIDES_DESC="<em>Otomatik tarama çalıştır</em> düğmesinin tek bir Anthropic API çağrısında kaç işaretli şablon geçersiz kılmasını incelediği. Varsayılan <strong>10</strong>. Aralık 1&ndash;100. <strong>Sohbet takibi için daha düşük olan daha güvenlidir:</strong> tarama raporu bulgu sayısıyla birlikte büyür ve sohbet araç kullanımı döngüsü bu raporu konuşma geçmişi olarak korur. Anthropic'in alt hız sınırı kademelerinde (dakikada 10K girdi jetonu), 60 geçersiz kılmalı bir tarama artı aynı dakikada anında bir sohbet sırası <em>HTTP 429: rate limit exceeded</em> döndürür. Çalıştırma başına 10 geçersiz kılma ile, tarama sonrası sohbet sıralarınız sınırın oldukça altında kalır. Bundan daha fazla geçersiz kılması olan sitelerin her şeyi kapsaması için sadece birkaç yeniden çalıştırmaya ihtiyacı vardır &mdash; her çalıştırmanın raporu kendi oturumu olarak kaydedilir, böylece her biriyle bağımsız olarak sohbet edebilirsiniz."

COM_CSOVERRIDECHECKER_CONFIG_MODEL_HAIKU="Haiku 4.5 — en hızlı, en düşük maliyetli (~1M girdi jetonu başına ~$1)"
COM_CSOVERRIDECHECKER_CONFIG_MODEL_SONNET="Sonnet 4.6 — dengeli (~1M girdi jetonu başına ~$3)"
COM_CSOVERRIDECHECKER_CONFIG_MODEL_OPUS="Opus 4.7 — en yetenekli, varsayılan (~1M girdi jetonu başına ~$15, Sonnet'in 5 katı)"

COM_CSOVERRIDECHECKER_CONFIG_MODEL_COST_WARNING="<strong>Maliyet farkı hakkında.</strong> <strong>Bu yazının yazıldığı tarihte</strong>, 50 geçersiz kılması olan bir sitede tipik bir tarama yaklaşık 60K girdi jetonu kullanır ve yaklaşık 5K çıktı jetonu üretir. Tarama başına yaklaşık maliyet: <strong>Haiku'da ~$0,08, Sonnet'te ~$0,23, Opus'ta ~$1,13</strong>. Sohbet sıraları çok daha küçüktür (her biri 5K&ndash;10K girdi jetonu), bu nedenle sıra başına maliyet bir taramadan kabaca 10&times; daha azdır. Anthropic'in yayımlanan fiyatlandırması <a href=\"https://www.anthropic.com/pricing\" target=\"_blank\" rel=\"noopener\">anthropic.com/pricing</a> adresinde gerçeğin kaynağıdır &mdash; yukarıdaki rakamlar yaklaşıktır ve zaman içinde değişebilir. Varsayılan Opus'tan daha ucuz bir kademeye geçmeye karar vermeden önce birkaç çalıştırma boyunca kullanımınızı <a href=\"https://console.anthropic.com/usage\" target=\"_blank\" rel=\"noopener\">console.anthropic.com/usage</a> adresinde izleyin."

