COM_CSOVERRIDECHECKER_DASHBOARD_FIX_AUDIENCE_BODY="Bunu yalnızca önceki bir incelemedeki düzeltmeleri uygulamak için <em>yeni bir sohbet</em> başlatıyorsanız kullanın — örneğin orijinal sohbeti gece kapattıysanız, incelemeyi bir ekip arkadaşına devrediyorsanız veya taramayı claude.ai'de çalıştırdıysanız ve düzeltmeleri Claude Code'da yapmak istiyorsanız. Tarama sohbetiniz hâlâ açıksa, yukarı kaydırın — orada Claude ile konuşmanız yeterli."

