COM_CSOVERRIDECHECKER_DASHBOARD_USAGE_STEP1_TITLE="Bir Joomla API jetonu oluşturun (tek seferlik)."
COM_CSOVERRIDECHECKER_DASHBOARD_USAGE_STEP1_BODY="Joomla yöneticisinde: <em>Sistem → Kullanıcılar → Profilim → Joomla API Jetonu</em> sekmesi. Jetonu göstermek için göz simgesine tıklayın ve ardından kopyalayın. <strong>Kalıcı olarak kaydetmek isterseniz</strong>, bu bileşendeki <em>Seçenekler → Anahtarlar ve jetonlar</em> bölümüne gidin, jetonu <em>Joomla API jetonu</em> alanına yapıştırın ve Kaydet'e tıklayın &mdash; aşağıdaki istem jetonla otomatik doldurulur, böylece her taramada yapıştırmanıza gerek kalmaz. Aksi takdirde, jetonu el altında tutun ve 2. adımdaki isteme yapıştırın."

COM_CSOVERRIDECHECKER_DASHBOARD_USAGE_STEP2_TITLE="Claude'u açın ve aşağıdaki komut istemini yapıştırın."
COM_CSOVERRIDECHECKER_DASHBOARD_USAGE_STEP2_BODY="Claude'u kullandığınız her yerde açın — bir tarayıcıda <a href=\"https://claude.ai\" target=\"_blank\" rel=\"noopener\">claude.ai</a>, bir terminalde <code>claude</code> çalıştırın (Claude Code) veya Claude'un mevcut olduğu başka bir araç. <strong>1. adımda jetonu Seçenekler içine kaydetmediyseniz</strong>, köşeli parantezler içindeki yer tutucu metni (<code>&lt;PASTE YOUR JOOMLA API TOKEN HERE&gt;</code>) kopyaladığınız jetonla değiştirin. Site URL'si ve uç noktaları bu site için zaten doldurulmuştur.<br><br><strong>Tarayıcı yerine Claude Code'u (terminal veya masaüstü uygulaması) öneririz.</strong> Claude plan kademenize bağlı olarak, inceleme, tarayıcıdaki <em>claude.ai</em>'nin Claude yanıtı tamamlamadan istek zaman aşımına ulaşmasına ve sohbetin takılmış gibi görünmesine yetecek kadar uzun sürebilir. Claude Code'un böyle bir sınırı yoktur ve incelemeyi güvenilir biçimde tamamlar.<br><br><strong>Yalnızca claude.ai kullanıcıları:</strong> Claude “Host not in allowlist” yanıtını verirse, kod yürütme korumalı alanı sitenizi engelliyor demektir. claude.ai içinde <em>Settings → Capabilities → Code execution → Network access</em> bölümünü açın ve bu sitenin alan adını ekleyin. <strong>Sonra mevcut sohbeti kapatın ve yeni bir sohbet başlatın</strong> — çalışan sohbet eski izin listesini kullanmaya devam eder; yalnızca yeni bir sohbet, yeni eklenen alan adını alır. (Bu, hem Claude masaüstü uygulaması hem de web sürümü için geçerlidir.) Bir terminaldeki Claude Code'un böyle bir kısıtlaması yoktur ve değişiklik yapmadan çalışır."

COM_CSOVERRIDECHECKER_DASHBOARD_USAGE_STEP3_TITLE="Gönderin."
COM_CSOVERRIDECHECKER_DASHBOARD_USAGE_STEP3_BODY="Claude geçersiz kılma listesini çekecek, her biri için geçersiz kılma ve çekirdek kaynağı getirecek ve iletebileceğiniz bir bulgu başına tablo ile sade dilli bir özet üretecektir."

COM_CSOVERRIDECHECKER_DASHBOARD_USAGE_STEP4_TITLE="Claude'a neyi düzelteceğini söyleyin — aynı sohbette."
COM_CSOVERRIDECHECKER_DASHBOARD_USAGE_STEP4_BODY="Claude raporu yayımladıktan sonra, hangi bulguların düzeltilmesini istediğinizi soracaktır. Onayladığınız bulgularla yanıt verin (ör. <em>“#1 ve #3'ü düzelt, #2'ye dokunma, üçüncü taraf olanı geliştiriciye soracağım”</em>). Claude yama uygulamadan önce her dosyayı yedekler, böylece her şey geri alınabilir. <strong>Yalnızca sohbeti kapattıysanız ve daha sonra geri dönmek istiyorsanız aşağıdaki ikinci karta ihtiyacınız olur.</strong>"

