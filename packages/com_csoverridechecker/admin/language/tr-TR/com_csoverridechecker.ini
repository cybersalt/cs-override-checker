COM_CSOVERRIDECHECKER="Override Checker"
COM_CSOVERRIDECHECKER_XML_DESCRIPTION="Şablon okuryazarı Joomla bütünlük izleyicisi. Yerleşik #__template_overrides izleyicisini bir Joomla Web Services API üzerinden sunar; böylece Claude (veya geçerli bir Joomla API jetonuna sahip herhangi bir istemci) işaretlenen her geçersiz kılmayı inceleyebilir, alert / review / info olarak sınıflandırabilir ve yamaları yerinde uygulayabilir — yamalar otomatik yedeklenir ve yönetici panelinden geri alınabilir."

COM_CSOVERRIDECHECKER_DISCLAIMER_TITLE="Başlamadan önce"
COM_CSOVERRIDECHECKER_DISCLAIMER_BODY="<p><strong>Bu eklentinin herhangi bir değişiklik yapmasına izin vermeden önce lütfen web sitenizin güncel bir yedeğine sahip olduğunuzdan emin olun.</strong> Akeeba Backup eklentisini veya barındırma sağlayıcınızın yedekleme özelliğini şiddetle tavsiye ederiz.</p><p><strong>Bu eklenti ne yapar:</strong> Joomla sitenizi bir yapay zekâ (Claude) ile eşleştirir; işaretlenen her şablon geçersiz kılmasını inceler, her birini bir güvenlik uyarısı, kozmetik bir fark veya meşru bir özelleştirme olarak sınıflandırır ve onayladığınız yamaları uygular. Her yama önce otomatik olarak veritabanına yedeklenir, böylece tek tek değişiklikler geri alınabilir — ancak diğer her şey için tam site yedeği yine de güvenlik ağınızdır.</p><p><strong>Yapay zekâ hata yapabilir.</strong> Claude bir şeyi yanlış sınıflandırabilir veya bir özelliği bozan bir yama önerebilir. “Evet, uygula” demeden önce her zaman önerileni okuyun ve düzeltmeler uygulandıktan sonra siteyi test edin.</p><p><strong>Emin değil misiniz?</strong> Bu aracı kullanmaktan rahat hissetmiyorsanız, Tim'e <a href=\"mailto:tim@cybersalt.com\">tim@cybersalt.com</a> adresinden e-posta gönderin ve konuşalım — size adım adım yardımcı olabiliriz veya incelemeyi sizin için yapabiliriz.</p>"
COM_CSOVERRIDECHECKER_DISCLAIMER_DONT_SHOW_AGAIN="Bunu bir daha gösterme"
COM_CSOVERRIDECHECKER_DISCLAIMER_CONFIRM_BUTTON="Anladım — devam et"

