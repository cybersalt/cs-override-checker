COM_CSOVERRIDECHECKER_DASHBOARD_AUTOSCAN_AVAILABLE_TITLE="API anahtarı kaydedildi."
COM_CSOVERRIDECHECKER_DASHBOARD_AUTOSCAN_AVAILABLE_BODY="Eklenti, Anthropic anahtarınızı kullanarak geçersiz kılma incelemesini sunucuda çalıştıracak; kopyala-yapıştır gerekmez. Rapor otomatik olarak yeni bir oturum olarak kaydedilir."
COM_CSOVERRIDECHECKER_DASHBOARD_AUTOSCAN_INTRO="Bir tarama başlatmak için aşağıya tıklayın. Eklenti, bu sitedeki işaretlenen her geçersiz kılmayı getirir, kayıtlı API anahtarınızla Claude'a gönderir ve elde edilen raporu yeni bir oturum olarak kaydeder. Tarama tamamlandığında rapora yönlendirileceksiniz."
COM_CSOVERRIDECHECKER_DASHBOARD_AUTOSCAN_NOTE="Tarama başına bir Anthropic API çağrısı. %d'den fazla geçersiz kılması olan siteler her çalıştırmada ilk %d ile sınırlandırılır (<em>Seçenekler &rarr; Anahtarlar &amp; jetonlar &rarr; Tarama başına geçersiz kılma sayısı</em> bölümünden yapılandırılabilir); bir sonraki grup için yeniden çalıştırın veya sınırsız boyut için aşağıdaki manuel claude.ai / Claude Code iş akışını kullanın. Sayfa, Claude yanıt verirken 30&ndash;90 saniye duraklayabilir &mdash; bu normaldir, sayfadan ayrılmayın."
COM_CSOVERRIDECHECKER_DASHBOARD_AUTOSCAN_CONFIRM="Bu işlem, kayıtlı anahtarınızla Anthropic API'sini çağıracak ve 30 ile 90 saniye sürebilir. Devam edilsin mi?"
COM_CSOVERRIDECHECKER_DASHBOARD_AUTOSCAN_BUTTON="Otomatik taramayı şimdi çalıştır"
COM_CSOVERRIDECHECKER_DASHBOARD_AUTOSCAN_NOKEY_BODY="Bu yöntem incelemenin tamamını sunucu tarafında çalıştırır &mdash; kopyala-yapıştır yok, ikinci pencere yok. Hemen aşağıdaki <em>Seçenekler</em> düğmesine tıklayın, Anthropic API anahtarınızı <em>Anahtarlar ve jetonlar</em> sekmesi altına yapıştırın ve Kaydet'e tıklayın. Anahtar sitenizin veritabanında kalır; yalnızca bu site onu kullanabilir. Yukarıdaki Yöntem 1, kopyala-yapıştır iş akışını tercih ederseniz Anthropic anahtarı olmadan da çalışır."

