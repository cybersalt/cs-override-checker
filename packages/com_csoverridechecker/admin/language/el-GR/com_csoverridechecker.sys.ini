COM_CSOVERRIDECHECKER="Override Checker"
COM_CSOVERRIDECHECKER_XML_DESCRIPTION="Παρακολούθηση ακεραιότητας Joomla με γνώση των προτύπων. Εκθέτει τον εγγενή πίνακα παρακολούθησης #__template_overrides μέσω ενός Joomla Web Services API ώστε το Claude (ή οποιοσδήποτε πελάτης με διακριτικό Joomla API) να μπορεί να επιθεωρεί κάθε επισημασμένη παράκαμψη, να την κατατάσσει ως ειδοποίηση / προς επανεξέταση / πληροφοριακή και να εφαρμόζει επιδιορθώσεις επί τόπου — με αυτόματη δημιουργία αντιγράφων ασφαλείας και δυνατότητα αναίρεσης από το διαχειριστικό."

