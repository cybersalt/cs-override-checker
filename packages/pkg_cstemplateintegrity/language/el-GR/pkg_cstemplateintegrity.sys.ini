PKG_CSTEMPLATEINTEGRITY="Cybersalt Override Checker"
PKG_CSTEMPLATEINTEGRITY_XML_DESCRIPTION="<h2>Cybersalt Override Checker</h2><p>Παρακολούθηση ακεραιότητας Joomla με γνώση των προτύπων. Εγκαθιστά τα <code>com_cstemplateintegrity</code> (στοιχείο διαχείρισης + Web Services API) και <code>plg_webservices_cstemplateintegrity</code> (καταχωρεί τις διαδρομές API του στοιχείου). Το πρόσθετο ενεργοποιείται αυτόματα κατά την εγκατάσταση.</p>"

PKG_CSTEMPLATEINTEGRITY_POSTINSTALL_INSTALLED="Το Cybersalt Override Checker εγκαταστάθηκε και το πρόσθετο Web Services ενεργοποιήθηκε αυτόματα. Το άκρο Overrides είναι πλέον διαθέσιμο στο /api/index.php/v1/cstemplateintegrity/overrides."
PKG_CSTEMPLATEINTEGRITY_POSTINSTALL_UPDATED="Το Cybersalt Override Checker ενημερώθηκε."
PKG_CSTEMPLATEINTEGRITY_POSTINSTALL_OPEN="Άνοιγμα πίνακα ελέγχου"
