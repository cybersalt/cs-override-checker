PKG_CSTEMPLATEINTEGRITY="Cybersalt Override Checker"
PKG_CSTEMPLATEINTEGRITY_XML_DESCRIPTION="<h2>Cybersalt Override Checker</h2><p>テンプレートを理解する Joomla 整合性モニターです。<code>com_cstemplateintegrity</code>（管理コンポーネント + Web Services API）と <code>plg_webservices_cstemplateintegrity</code>（コンポーネントの API ルートを登録）をインストールします。プラグインはインストール時に自動的に有効化されます。</p>"

PKG_CSTEMPLATEINTEGRITY_POSTINSTALL_INSTALLED="Cybersalt Override Checker がインストールされ、Web Services プラグインが自動的に有効化されました。Overrides エンドポイントは /api/index.php/v1/cstemplateintegrity/overrides で利用可能になりました。"
PKG_CSTEMPLATEINTEGRITY_POSTINSTALL_UPDATED="Cybersalt Override Checker が更新されました。"
PKG_CSTEMPLATEINTEGRITY_POSTINSTALL_OPEN="ダッシュボードを開く"
