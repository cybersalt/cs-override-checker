PKG_CSTEMPLATEINTEGRITY="Cybersalt Template Integrity"
PKG_CSTEMPLATEINTEGRITY_XML_DESCRIPTION="<h2>Cybersalt Template Integrity</h2><p>Template-literate Joomla integrity monitor. Installs <code>com_cstemplateintegrity</code> (admin component + Web Services API), <code>plg_webservices_cstemplateintegrity</code> (registers the component's API routes), and <code>plg_task_cstemplateintegrity</code> (Scheduled-Tasks routine for purging old file backups). Both plugins are enabled automatically on install; a default purge task is seeded unpublished so the admin can review and enable it from System &rarr; Scheduled Tasks.</p>"

PKG_CSTEMPLATEINTEGRITY_POSTINSTALL_INSTALLED="Cybersalt Template Integrity has been installed and the Web Services + Scheduled-Tasks plugins have been enabled automatically. The Overrides endpoint is now available at /api/index.php/v1/cstemplateintegrity/overrides. A default purge-old-file-backups Scheduled Task was seeded for you (unpublished — review it under System → Scheduled Tasks and enable when you're ready)."
PKG_CSTEMPLATEINTEGRITY_POSTINSTALL_UPDATED="Cybersalt Template Integrity has been updated."
PKG_CSTEMPLATEINTEGRITY_POSTINSTALL_OPEN="Open Dashboard"
