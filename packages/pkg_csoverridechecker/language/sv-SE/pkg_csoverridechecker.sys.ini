PKG_CSOVERRIDECHECKER="Cybersalt Override Checker"
PKG_CSOVERRIDECHECKER_XML_DESCRIPTION="<h2>Cybersalt Override Checker</h2><p>Mallmedveten integritetsövervakare för Joomla. Installerar <code>com_csoverridechecker</code> (admin-komponent + Web Services-API) och <code>plg_webservices_csoverridechecker</code> (registrerar komponentens API-rutter). Insticksprogrammet aktiveras automatiskt vid installationen.</p>"

PKG_CSOVERRIDECHECKER_POSTINSTALL_INSTALLED="Cybersalt Override Checker har installerats och Web Services-insticksprogrammet har aktiverats automatiskt. Slutpunkten för åsidosättningar är nu tillgänglig på /api/index.php/v1/csoverridechecker/overrides."
PKG_CSOVERRIDECHECKER_POSTINSTALL_UPDATED="Cybersalt Override Checker har uppdaterats."
PKG_CSOVERRIDECHECKER_POSTINSTALL_OPEN="Öppna översikten"

PKG_CSOVERRIDECHECKER_POSTINSTALL_MIGRATED_TITLE="Namnbyte slutfört — inställningar och data har överförts"
PKG_CSOVERRIDECHECKER_POSTINSTALL_MIGRATED_BODY="Du har uppgraderat från den tidigare versionen Cybersalt Template Integrity. Det gamla namnet bröt mot Joomla Extension Directorys policy för reserverade ord (som förbjuder \"Template\" i tilläggsnamn), så alla interna identifierare har bytt namn till Cybersalt Override Checker. Din API-nyckel, inställningar, scanninghistorik, åtgärdslogg, filsäkerhetskopior och schemalagda uppgift har alla kopierats över. Knappen nedan öppnar Tilläggshanteraren filtrerad på det gamla paketet — bocka för dess rad och klicka på Avinstallera; Joomla tar automatiskt bort den medföljande komponenten och båda tilläggen i en kaskad."
PKG_CSOVERRIDECHECKER_POSTINSTALL_MIGRATED_UNINSTALL="Öppna Tilläggshanteraren för att avinstallera det gamla paketet"
