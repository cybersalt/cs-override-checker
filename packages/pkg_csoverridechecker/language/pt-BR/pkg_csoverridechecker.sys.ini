PKG_CSOVERRIDECHECKER="Cybersalt Override Checker"
PKG_CSOVERRIDECHECKER_XML_DESCRIPTION="<h2>Cybersalt Override Checker</h2><p>Monitor de integridade do Joomla com conhecimento de templates. Instala o <code>com_csoverridechecker</code> (componente administrativo + API de Web Services) e o <code>plg_webservices_csoverridechecker</code> (registra as rotas de API do componente). O plugin é ativado automaticamente na instalação.</p>"

PKG_CSOVERRIDECHECKER_POSTINSTALL_INSTALLED="O Cybersalt Override Checker foi instalado e o plugin de Web Services foi ativado automaticamente. O endpoint de Substituições agora está disponível em /api/index.php/v1/csoverridechecker/overrides."
PKG_CSOVERRIDECHECKER_POSTINSTALL_UPDATED="O Cybersalt Override Checker foi atualizado."
PKG_CSOVERRIDECHECKER_POSTINSTALL_OPEN="Abrir Painel"

PKG_CSOVERRIDECHECKER_POSTINSTALL_MIGRATED_TITLE="Renomeação concluída — configurações e dados migrados"
PKG_CSOVERRIDECHECKER_POSTINSTALL_MIGRATED_BODY="Você atualizou da versão anterior Cybersalt Template Integrity. O nome antigo violava a política de palavras reservadas do Joomla Extension Directory (que proíbe \"Template\" em nomes de extensões), por isso renomeamos todos os identificadores internos para Cybersalt Override Checker. Sua chave API, configurações, histórico de varreduras, registro de ações, backups de arquivos e tarefa agendada foram copiados. O botão abaixo abre o Gerenciador de Extensões filtrado para o pacote antigo — marque sua linha e clique em Desinstalar; o Joomla removerá em cascata o componente e ambos os plugins incluídos automaticamente."
PKG_CSOVERRIDECHECKER_POSTINSTALL_MIGRATED_UNINSTALL="Abrir Gerenciador de Extensões para desinstalar o pacote antigo"
