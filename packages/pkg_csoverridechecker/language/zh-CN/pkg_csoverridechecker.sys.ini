PKG_CSOVERRIDECHECKER="Cybersalt Override Checker"
PKG_CSOVERRIDECHECKER_XML_DESCRIPTION="<h2>Cybersalt Override Checker</h2><p>模板感知的 Joomla 完整性监控工具。安装 <code>com_csoverridechecker</code>（管理组件 + Web Services API）和 <code>plg_webservices_csoverridechecker</code>（注册组件的 API 路由）。该插件在安装时会自动启用。</p>"

PKG_CSOVERRIDECHECKER_POSTINSTALL_INSTALLED="Cybersalt Override Checker 已安装，Web Services 插件已自动启用。Overrides 端点现已可用，地址为 /api/index.php/v1/csoverridechecker/overrides。"
PKG_CSOVERRIDECHECKER_POSTINSTALL_UPDATED="Cybersalt Override Checker 已更新。"
PKG_CSOVERRIDECHECKER_POSTINSTALL_OPEN="打开仪表板"

PKG_CSOVERRIDECHECKER_POSTINSTALL_MIGRATED_TITLE="重命名完成 — 设置和数据已迁移"
PKG_CSOVERRIDECHECKER_POSTINSTALL_MIGRATED_BODY="您已从之前的 Cybersalt Template Integrity 版本升级。旧名称违反了 Joomla 扩展目录的保留字策略（禁止扩展名称中包含 \"Template\"），因此所有内部标识符已重命名为 Cybersalt Override Checker。您的 API 密钥、设置、扫描历史、操作日志、文件备份和计划任务已全部复制。下面的按钮会打开扩展管理器并筛选出旧的扩展包 — 勾选该行并点击卸载，Joomla 将自动级联删除捆绑的组件和两个插件。"
PKG_CSOVERRIDECHECKER_POSTINSTALL_MIGRATED_UNINSTALL="打开扩展管理器卸载旧的扩展包"
