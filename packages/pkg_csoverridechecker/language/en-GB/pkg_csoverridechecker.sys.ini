PKG_CSOVERRIDECHECKER="Cybersalt Override Checker"
PKG_CSOVERRIDECHECKER_XML_DESCRIPTION="<h2>Cybersalt Override Checker</h2><p>Template-literate Joomla integrity monitor. Installs <code>com_csoverridechecker</code> (admin component + Web Services API), <code>plg_webservices_csoverridechecker</code> (registers the component's API routes), and <code>plg_task_csoverridechecker</code> (Scheduled-Tasks routine for purging old file backups). Both plugins are enabled automatically on install; a default purge task is seeded unpublished so the admin can review and enable it from System &rarr; Scheduled Tasks.</p>"

PKG_CSOVERRIDECHECKER_POSTINSTALL_INSTALLED="Cybersalt Override Checker has been installed and the Web Services + Scheduled-Tasks plugins have been enabled automatically. The Overrides endpoint is now available at /api/index.php/v1/csoverridechecker/overrides. A default purge-old-file-backups Scheduled Task was seeded for you (unpublished — review it under System → Scheduled Tasks and enable when you're ready)."
PKG_CSOVERRIDECHECKER_POSTINSTALL_UPDATED="Cybersalt Override Checker has been updated."
PKG_CSOVERRIDECHECKER_POSTINSTALL_OPEN="Open Dashboard"

PKG_CSOVERRIDECHECKER_POSTINSTALL_MIGRATED_TITLE="Rename complete — settings and data migrated"
PKG_CSOVERRIDECHECKER_POSTINSTALL_MIGRATED_BODY="You have upgraded from the previous Cybersalt Template Integrity release. The old name did not meet the Joomla Extension Directory reserved-words policy (which bars \"Template\" in extension names), so every internal identifier has been renamed to Cybersalt Override Checker. Your API key, settings, scan history, action log, file backups and scheduled task have all been copied over. The button below opens the Extensions Manager filtered to the old package — tick its row and click Uninstall, and Joomla will cascade-remove the bundled component and both plugins automatically."
PKG_CSOVERRIDECHECKER_POSTINSTALL_MIGRATED_UNINSTALL="Open Extensions Manager to uninstall the old package"
