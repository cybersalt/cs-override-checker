PKG_CSOVERRIDECHECKER="Cybersalt Override Checker"
PKG_CSOVERRIDECHECKER_XML_DESCRIPTION="<h2>Cybersalt Override Checker</h2><p>Template-bewuste integriteitsmonitor voor Joomla. Installeert <code>com_csoverridechecker</code> (beheerderscomponent + Web Services API) en <code>plg_webservices_csoverridechecker</code> (registreert de API-routes van de component). De plug-in wordt bij installatie automatisch geactiveerd.</p>"

PKG_CSOVERRIDECHECKER_POSTINSTALL_INSTALLED="Cybersalt Override Checker is geïnstalleerd en de Web Services-plug-in is automatisch geactiveerd. Het Overrides-eindpunt is nu beschikbaar op /api/index.php/v1/csoverridechecker/overrides."
PKG_CSOVERRIDECHECKER_POSTINSTALL_UPDATED="Cybersalt Override Checker is bijgewerkt."
PKG_CSOVERRIDECHECKER_POSTINSTALL_OPEN="Dashboard openen"

PKG_CSOVERRIDECHECKER_POSTINSTALL_MIGRATED_TITLE="Hernoeming voltooid — instellingen en gegevens gemigreerd"
PKG_CSOVERRIDECHECKER_POSTINSTALL_MIGRATED_BODY="U heeft bijgewerkt vanaf de vorige versie Cybersalt Template Integrity. De oude naam voldeed niet aan het naamgevingsbeleid van de Joomla Extension Directory (dat \"Template\" in extensienamen verbiedt), dus alle interne identifiers zijn hernoemd naar Cybersalt Override Checker. Uw API-sleutel, instellingen, scangeschiedenis, actielogboek, bestandsback-ups en geplande taak zijn allemaal overgezet. De knop hieronder opent Extensiebeheer gefilterd op het oude pakket — vink de rij aan en klik op Verwijderen; Joomla verwijdert automatisch ook de gebundelde component en beide plug-ins."
PKG_CSOVERRIDECHECKER_POSTINSTALL_MIGRATED_UNINSTALL="Open Extensiebeheer om het oude pakket te verwijderen"
