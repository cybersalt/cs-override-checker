PKG_CSOVERRIDECHECKER="Cybersalt Override Checker"
PKG_CSOVERRIDECHECKER_XML_DESCRIPTION="<h2>Cybersalt Override Checker</h2><p>Παρακολούθηση ακεραιότητας Joomla με γνώση των προτύπων. Εγκαθιστά τα <code>com_csoverridechecker</code> (στοιχείο διαχείρισης + Web Services API) και <code>plg_webservices_csoverridechecker</code> (καταχωρεί τις διαδρομές API του στοιχείου). Το πρόσθετο ενεργοποιείται αυτόματα κατά την εγκατάσταση.</p>"

PKG_CSOVERRIDECHECKER_POSTINSTALL_INSTALLED="Το Cybersalt Override Checker εγκαταστάθηκε και το πρόσθετο Web Services ενεργοποιήθηκε αυτόματα. Το άκρο Overrides είναι πλέον διαθέσιμο στο /api/index.php/v1/csoverridechecker/overrides."
PKG_CSOVERRIDECHECKER_POSTINSTALL_UPDATED="Το Cybersalt Override Checker ενημερώθηκε."
PKG_CSOVERRIDECHECKER_POSTINSTALL_OPEN="Άνοιγμα πίνακα ελέγχου"

PKG_CSOVERRIDECHECKER_POSTINSTALL_MIGRATED_TITLE="Η μετονομασία ολοκληρώθηκε — οι ρυθμίσεις και τα δεδομένα μεταφέρθηκαν"
PKG_CSOVERRIDECHECKER_POSTINSTALL_MIGRATED_BODY="Ενημερώσατε από την προηγούμενη έκδοση Cybersalt Template Integrity. Το παλιό όνομα παραβίαζε την πολιτική δεσμευμένων λέξεων του Joomla Extension Directory (που απαγορεύει το \"Template\" στα ονόματα επεκτάσεων), επομένως όλα τα εσωτερικά αναγνωριστικά μετονομάστηκαν σε Cybersalt Override Checker. Το κλειδί API, οι ρυθμίσεις, το ιστορικό σαρώσεων, το αρχείο καταγραφής ενεργειών, τα αντίγραφα ασφαλείας αρχείων και η προγραμματισμένη εργασία έχουν αντιγραφεί. Το παρακάτω κουμπί ανοίγει τη Διαχείριση Επεκτάσεων φιλτραρισμένη στο παλιό πακέτο — επιλέξτε τη γραμμή του και κάντε κλικ στο Απεγκατάσταση· το Joomla θα αφαιρέσει αυτόματα και διαδοχικά τη συμπεριλαμβανόμενη συνιστώσα και τις δύο προσθήκες."
PKG_CSOVERRIDECHECKER_POSTINSTALL_MIGRATED_UNINSTALL="Άνοιγμα Διαχείρισης Επεκτάσεων για απεγκατάσταση του παλιού πακέτου"
