PKG_CSOVERRIDECHECKER="Cybersalt Override Checker"
PKG_CSOVERRIDECHECKER_XML_DESCRIPTION="<h2>Cybersalt Override Checker</h2><p>Moniteur d'intégrité Joomla compétent en matière de templates. Installe <code>com_csoverridechecker</code> (composant d'administration + API Web Services) et <code>plg_webservices_csoverridechecker</code> (qui enregistre les routes API du composant). Le plugin est activé automatiquement lors de l'installation.</p>"

PKG_CSOVERRIDECHECKER_POSTINSTALL_INSTALLED="Cybersalt Override Checker a été installé et le plugin Web Services a été activé automatiquement. Le point de terminaison Overrides est désormais disponible à l'adresse /api/index.php/v1/csoverridechecker/overrides."
PKG_CSOVERRIDECHECKER_POSTINSTALL_UPDATED="Cybersalt Override Checker a été mis à jour."
PKG_CSOVERRIDECHECKER_POSTINSTALL_OPEN="Ouvrir le tableau de bord"

PKG_CSOVERRIDECHECKER_POSTINSTALL_MIGRATED_TITLE="Renommage terminé — paramètres et données migrés"
PKG_CSOVERRIDECHECKER_POSTINSTALL_MIGRATED_BODY="Vous avez effectué une mise à jour depuis la version précédente Cybersalt Template Integrity. L'ancien nom enfreignait la politique des mots réservés du Joomla Extension Directory (qui interdit \"Template\" dans les noms d'extensions), tous les identifiants internes ont donc été renommés en Cybersalt Override Checker. Votre clé API, vos paramètres, l'historique des analyses, le journal d'actions, les sauvegardes de fichiers et la tâche planifiée ont tous été copiés. Le bouton ci-dessous ouvre le Gestionnaire d'extensions filtré sur l'ancien paquet — cochez sa ligne et cliquez sur Désinstaller ; Joomla supprimera automatiquement le composant et les deux plugins inclus."
PKG_CSOVERRIDECHECKER_POSTINSTALL_MIGRATED_UNINSTALL="Ouvrir le Gestionnaire d'extensions pour désinstaller l'ancien paquet"
