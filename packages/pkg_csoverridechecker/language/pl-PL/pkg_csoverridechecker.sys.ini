PKG_CSOVERRIDECHECKER="Cybersalt Override Checker"
PKG_CSOVERRIDECHECKER_XML_DESCRIPTION="<h2>Cybersalt Override Checker</h2><p>Monitor integralności Joomla zorientowany na szablony. Instaluje <code>com_csoverridechecker</code> (komponent administracyjny + Web Services API) oraz <code>plg_webservices_csoverridechecker</code> (rejestruje trasy API komponentu). Wtyczka jest włączana automatycznie podczas instalacji.</p>"

PKG_CSOVERRIDECHECKER_POSTINSTALL_INSTALLED="Zainstalowano Cybersalt Override Checker, a wtyczka Web Services została automatycznie włączona. Punkt końcowy nadpisań jest teraz dostępny pod /api/index.php/v1/csoverridechecker/overrides."
PKG_CSOVERRIDECHECKER_POSTINSTALL_UPDATED="Zaktualizowano Cybersalt Override Checker."
PKG_CSOVERRIDECHECKER_POSTINSTALL_OPEN="Otwórz panel"

PKG_CSOVERRIDECHECKER_POSTINSTALL_MIGRATED_TITLE="Zmiana nazwy zakończona — ustawienia i dane przeniesione"
PKG_CSOVERRIDECHECKER_POSTINSTALL_MIGRATED_BODY="Zaktualizowałeś z poprzedniej wersji Cybersalt Template Integrity. Stara nazwa naruszała politykę słów zastrzeżonych Katalogu Rozszerzeń Joomla (która zabrania \"Template\" w nazwach rozszerzeń), więc wszystkie wewnętrzne identyfikatory zostały zmienione na Cybersalt Override Checker. Twój klucz API, ustawienia, historia skanowania, dziennik akcji, kopie zapasowe plików i zaplanowane zadanie zostały skopiowane. Przycisk poniżej otwiera Menedżera rozszerzeń przefiltrowanego do starego pakietu — zaznacz jego wiersz i kliknij Odinstaluj; Joomla automatycznie usunie dołączony komponent i oba pluginy."
PKG_CSOVERRIDECHECKER_POSTINSTALL_MIGRATED_UNINSTALL="Otwórz Menedżera rozszerzeń, aby odinstalować stary pakiet"
