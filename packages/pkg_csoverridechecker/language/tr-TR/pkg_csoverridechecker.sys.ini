PKG_CSOVERRIDECHECKER="Cybersalt Override Checker"
PKG_CSOVERRIDECHECKER_XML_DESCRIPTION="<h2>Cybersalt Override Checker</h2><p>Şablon okuryazarı Joomla bütünlük izleyicisi. <code>com_csoverridechecker</code> (yönetici bileşeni + Web Services API) ile <code>plg_webservices_csoverridechecker</code> (bileşenin API rotalarını kaydeder) eklentilerini kurar. Eklenti, kurulum sırasında otomatik olarak etkinleştirilir.</p>"

PKG_CSOVERRIDECHECKER_POSTINSTALL_INSTALLED="Cybersalt Override Checker kuruldu ve Web Services eklentisi otomatik olarak etkinleştirildi. Overrides uç noktası artık /api/index.php/v1/csoverridechecker/overrides adresinde kullanılabilir."
PKG_CSOVERRIDECHECKER_POSTINSTALL_UPDATED="Cybersalt Override Checker güncellendi."
PKG_CSOVERRIDECHECKER_POSTINSTALL_OPEN="Kontrol Panelini Aç"

PKG_CSOVERRIDECHECKER_POSTINSTALL_MIGRATED_TITLE="Yeniden adlandırma tamamlandı — ayarlar ve veriler taşındı"
PKG_CSOVERRIDECHECKER_POSTINSTALL_MIGRATED_BODY="Önceki Cybersalt Template Integrity sürümünden yükselttiniz. Eski ad, Joomla Eklenti Dizini ayrılmış sözcükler politikasını ihlal ediyordu (eklenti adlarında \"Template\" yasak), bu yüzden tüm dahili tanımlayıcılar Cybersalt Override Checker olarak yeniden adlandırıldı. API anahtarınız, ayarlarınız, tarama geçmişiniz, eylem günlüğünüz, dosya yedekleriniz ve zamanlanmış göreviniz kopyalandı. Aşağıdaki düğme, eski pakete göre filtrelenmiş Eklenti Yöneticisi'ni açar — satırını işaretleyip Kaldır'a tıklayın; Joomla, paketteki bileşeni ve her iki eklentiyi otomatik olarak art arda kaldıracaktır."
PKG_CSOVERRIDECHECKER_POSTINSTALL_MIGRATED_UNINSTALL="Eski paketi kaldırmak için Eklenti Yöneticisi'ni aç"
