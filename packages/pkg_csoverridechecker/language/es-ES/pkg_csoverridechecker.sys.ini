PKG_CSOVERRIDECHECKER="Cybersalt Override Checker"
PKG_CSOVERRIDECHECKER_XML_DESCRIPTION="<h2>Cybersalt Override Checker</h2><p>Monitor de integridad de Joomla con conocimiento de plantillas. Instala <code>com_csoverridechecker</code> (componente de administración + API de servicios web) y <code>plg_webservices_csoverridechecker</code> (registra las rutas de la API del componente). El plugin se activa automáticamente durante la instalación.</p>"

PKG_CSOVERRIDECHECKER_POSTINSTALL_INSTALLED="Cybersalt Override Checker se ha instalado y el plugin de servicios web se ha activado automáticamente. El extremo de anulaciones (Overrides) ya está disponible en /api/index.php/v1/csoverridechecker/overrides."
PKG_CSOVERRIDECHECKER_POSTINSTALL_UPDATED="Cybersalt Override Checker se ha actualizado."
PKG_CSOVERRIDECHECKER_POSTINSTALL_OPEN="Abrir el panel de control"

PKG_CSOVERRIDECHECKER_POSTINSTALL_MIGRATED_TITLE="Renombrado completado — configuración y datos migrados"
PKG_CSOVERRIDECHECKER_POSTINSTALL_MIGRATED_BODY="Has actualizado desde la versión anterior Cybersalt Template Integrity. El nombre antiguo no cumplía la política de palabras reservadas del Joomla Extension Directory (que prohíbe \"Template\" en los nombres de extensiones), por lo que se renombraron todos los identificadores internos a Cybersalt Override Checker. Tu clave API, configuración, historial de análisis, registro de acciones, copias de seguridad de archivos y tarea programada se han copiado. El botón de abajo abre el Administrador de extensiones filtrado al paquete antiguo — marca su fila y haz clic en Desinstalar; Joomla eliminará en cascada el componente y ambos plugins incluidos automáticamente."
PKG_CSOVERRIDECHECKER_POSTINSTALL_MIGRATED_UNINSTALL="Abrir el Administrador de extensiones para desinstalar el paquete antiguo"
