PKG_CSOVERRIDECHECKER="Cybersalt Override Checker"
PKG_CSOVERRIDECHECKER_XML_DESCRIPTION="<h2>Cybersalt Override Checker</h2><p>Template-bewusster Joomla-Integritätsmonitor. Installiert <code>com_csoverridechecker</code> (Admin-Komponente + Web Services API) und <code>plg_webservices_csoverridechecker</code> (registriert die API-Routen der Komponente). Das Plugin wird bei der Installation automatisch aktiviert.</p>"

PKG_CSOVERRIDECHECKER_POSTINSTALL_INSTALLED="Cybersalt Override Checker wurde installiert und das Web Services-Plugin wurde automatisch aktiviert. Der Overrides-Endpunkt ist jetzt unter /api/index.php/v1/csoverridechecker/overrides verfügbar."
PKG_CSOVERRIDECHECKER_POSTINSTALL_UPDATED="Cybersalt Override Checker wurde aktualisiert."
PKG_CSOVERRIDECHECKER_POSTINSTALL_OPEN="Dashboard öffnen"

PKG_CSOVERRIDECHECKER_POSTINSTALL_MIGRATED_TITLE="Umbenennung abgeschlossen — Einstellungen und Daten übertragen"
PKG_CSOVERRIDECHECKER_POSTINSTALL_MIGRATED_BODY="Sie haben von der vorherigen Version Cybersalt Template Integrity aktualisiert. Der alte Name verstieß gegen die Namensrichtlinie des Joomla Extension Directory (die \"Template\" in Erweiterungsnamen verbietet), daher wurden alle internen Bezeichner in Cybersalt Override Checker umbenannt. Ihr API-Schlüssel, Ihre Einstellungen, der Scan-Verlauf, das Aktionsprotokoll, Datei-Backups und der geplante Task wurden alle übertragen. Die Schaltfläche unten öffnet die Erweiterungsverwaltung, gefiltert auf das alte Paket — markieren Sie dessen Zeile und klicken Sie auf Deinstallieren; Joomla entfernt die enthaltene Komponente und beide Plugins automatisch."
PKG_CSOVERRIDECHECKER_POSTINSTALL_MIGRATED_UNINSTALL="Erweiterungsverwaltung öffnen, um das alte Paket zu deinstallieren"
