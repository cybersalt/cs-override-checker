PKG_CSOVERRIDECHECKER="Cybersalt Override Checker"
PKG_CSOVERRIDECHECKER_XML_DESCRIPTION="<h2>Cybersalt Override Checker</h2><p>Monitor di integrità per Joomla con conoscenza dei template. Installa <code>com_csoverridechecker</code> (componente di amministrazione + Web Services API) e <code>plg_webservices_csoverridechecker</code> (registra le rotte API del componente). Il plugin viene abilitato automaticamente in fase di installazione.</p>"

PKG_CSOVERRIDECHECKER_POSTINSTALL_INSTALLED="Cybersalt Override Checker è stato installato e il plugin Web Services è stato abilitato automaticamente. L'endpoint degli Override è ora disponibile su /api/index.php/v1/csoverridechecker/overrides."
PKG_CSOVERRIDECHECKER_POSTINSTALL_UPDATED="Cybersalt Override Checker è stato aggiornato."
PKG_CSOVERRIDECHECKER_POSTINSTALL_OPEN="Apri Cruscotto"

PKG_CSOVERRIDECHECKER_POSTINSTALL_MIGRATED_TITLE="Rinomina completata — impostazioni e dati migrati"
PKG_CSOVERRIDECHECKER_POSTINSTALL_MIGRATED_BODY="Hai aggiornato dalla versione precedente Cybersalt Template Integrity. Il vecchio nome violava la politica delle parole riservate del Joomla Extension Directory (che vieta \"Template\" nei nomi delle estensioni), quindi tutti gli identificatori interni sono stati rinominati in Cybersalt Override Checker. La tua chiave API, le impostazioni, la cronologia delle scansioni, il registro azioni, i backup dei file e l'attività pianificata sono stati copiati. Il pulsante sotto apre il Gestore Estensioni filtrato sul vecchio pacchetto — spunta la sua riga e fai clic su Disinstalla; Joomla rimuoverà in cascata il componente e entrambi i plugin inclusi automaticamente."
PKG_CSOVERRIDECHECKER_POSTINSTALL_MIGRATED_UNINSTALL="Apri il Gestore Estensioni per disinstallare il vecchio pacchetto"
