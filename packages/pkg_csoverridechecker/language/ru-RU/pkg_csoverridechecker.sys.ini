PKG_CSOVERRIDECHECKER="Cybersalt Override Checker"
PKG_CSOVERRIDECHECKER_XML_DESCRIPTION="<h2>Cybersalt Override Checker</h2><p>Монитор целостности Joomla с пониманием шаблонов. Устанавливает <code>com_csoverridechecker</code> (компонент администратора + Web Services API) и <code>plg_webservices_csoverridechecker</code> (регистрирует маршруты API компонента). Плагин включается автоматически при установке.</p>"

PKG_CSOVERRIDECHECKER_POSTINSTALL_INSTALLED="Cybersalt Override Checker установлен, плагин Web Services включён автоматически. Конечная точка Overrides теперь доступна по адресу /api/index.php/v1/csoverridechecker/overrides."
PKG_CSOVERRIDECHECKER_POSTINSTALL_UPDATED="Cybersalt Override Checker обновлён."
PKG_CSOVERRIDECHECKER_POSTINSTALL_OPEN="Открыть панель управления"

PKG_CSOVERRIDECHECKER_POSTINSTALL_MIGRATED_TITLE="Переименование завершено — настройки и данные перенесены"
PKG_CSOVERRIDECHECKER_POSTINSTALL_MIGRATED_BODY="Вы обновились с предыдущей версии Cybersalt Template Integrity. Старое имя нарушало политику зарезервированных слов в каталоге расширений Joomla (которая запрещает слово \"Template\" в названиях расширений), поэтому все внутренние идентификаторы переименованы в Cybersalt Override Checker. Ваш API-ключ, настройки, история сканирований, журнал действий, резервные копии файлов и запланированная задача — всё было скопировано. Кнопка ниже открывает менеджер расширений с фильтром на старый пакет — отметьте его строку и нажмите Удалить; Joomla автоматически удалит связанный компонент и оба плагина."
PKG_CSOVERRIDECHECKER_POSTINSTALL_MIGRATED_UNINSTALL="Открыть менеджер расширений для удаления старого пакета"
