PKG_CSOVERRIDECHECKER="Cybersalt Override Checker"
PKG_CSOVERRIDECHECKER_XML_DESCRIPTION="<h2>Cybersalt Override Checker</h2><p>Monitor integrity šablon Joomla. Instaluje <code>com_csoverridechecker</code> (administrační komponenta + Web Services API) a <code>plg_webservices_csoverridechecker</code> (registruje API trasy komponenty). Plugin je při instalaci automaticky povolen.</p>"

PKG_CSOVERRIDECHECKER_POSTINSTALL_INSTALLED="Cybersalt Override Checker bylo nainstalováno a Web Services plugin byl automaticky povolen. Endpoint Overrides je nyní dostupný na /api/index.php/v1/csoverridechecker/overrides."
PKG_CSOVERRIDECHECKER_POSTINSTALL_UPDATED="Cybersalt Override Checker bylo aktualizováno."
PKG_CSOVERRIDECHECKER_POSTINSTALL_OPEN="Otevřít nástěnku"

PKG_CSOVERRIDECHECKER_POSTINSTALL_MIGRATED_TITLE="Přejmenování dokončeno — nastavení a data byla přenesena"
PKG_CSOVERRIDECHECKER_POSTINSTALL_MIGRATED_BODY="Aktualizovali jste z předchozí verze Cybersalt Template Integrity. Starý název porušoval pravidla rezervovaných slov v Joomla Extension Directory (která zakazuje slovo \"Template\" v názvech rozšíření), proto byly všechny interní identifikátory přejmenovány na Cybersalt Override Checker. Váš API klíč, nastavení, historie skenování, protokol akcí, zálohy souborů a plánovaná úloha byly zkopírovány. Tlačítko níže otevře Správce rozšíření filtrovaný na starý balíček — zaškrtněte jeho řádek a klikněte na Odinstalovat; Joomla automaticky kaskádově odstraní přibalenou komponentu i oba pluginy."
PKG_CSOVERRIDECHECKER_POSTINSTALL_MIGRATED_UNINSTALL="Otevřít správce rozšíření pro odinstalaci starého balíčku"
