PKG_CSOVERRIDECHECKER="Cybersalt Override Checker"
PKG_CSOVERRIDECHECKER_XML_DESCRIPTION="<h2>Cybersalt Override Checker</h2><p>テンプレートを理解する Joomla 整合性モニターです。<code>com_csoverridechecker</code>（管理コンポーネント + Web Services API）と <code>plg_webservices_csoverridechecker</code>（コンポーネントの API ルートを登録）をインストールします。プラグインはインストール時に自動的に有効化されます。</p>"

PKG_CSOVERRIDECHECKER_POSTINSTALL_INSTALLED="Cybersalt Override Checker がインストールされ、Web Services プラグインが自動的に有効化されました。Overrides エンドポイントは /api/index.php/v1/csoverridechecker/overrides で利用可能になりました。"
PKG_CSOVERRIDECHECKER_POSTINSTALL_UPDATED="Cybersalt Override Checker が更新されました。"
PKG_CSOVERRIDECHECKER_POSTINSTALL_OPEN="ダッシュボードを開く"

PKG_CSOVERRIDECHECKER_POSTINSTALL_MIGRATED_TITLE="リネーム完了 — 設定とデータを移行しました"
PKG_CSOVERRIDECHECKER_POSTINSTALL_MIGRATED_BODY="以前のバージョン Cybersalt Template Integrity からアップグレードしました。古い名前は Joomla Extension Directory の予約語ポリシー（拡張機能名に \"Template\" を含むことを禁止）に違反していたため、すべての内部識別子を Cybersalt Override Checker にリネームしました。API キー、設定、スキャン履歴、操作ログ、ファイルバックアップ、スケジュールタスクはすべてコピー済みです。下のボタンは古いパッケージにフィルタされた拡張機能マネージャーを開きます — その行にチェックを入れて「アンインストール」をクリックすると、Joomla が同梱のコンポーネントと両方のプラグインを自動的に連鎖削除します。"
PKG_CSOVERRIDECHECKER_POSTINSTALL_MIGRATED_UNINSTALL="拡張機能マネージャーを開いて古いパッケージをアンインストール"
