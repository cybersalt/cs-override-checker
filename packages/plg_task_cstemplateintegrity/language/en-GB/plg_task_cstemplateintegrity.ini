PLG_TASK_CSTEMPLATEINTEGRITY="Cybersalt Override Checker — Scheduled tasks"
PLG_TASK_CSTEMPLATEINTEGRITY_XML_DESCRIPTION="Adds a Scheduled Task routine that purges old file-backup rows from cs-template-integrity. Lets a site owner cap how long pre-fix snapshots are retained so the database table doesn't grow indefinitely."

PLG_TASK_CSTEMPLATEINTEGRITY_TASK_PURGE_BACKUPS_TITLE="cs-template-integrity: Purge old file backups"
PLG_TASK_CSTEMPLATEINTEGRITY_TASK_PURGE_BACKUPS_DESC="Deletes #__cstemplateintegrity_backups rows older than the configured retention window (default 30 days). Run this on a daily or weekly cron schedule so pre-fix snapshots don't accumulate forever. Restore-from-backup still works on whatever's inside the retention window."

PLG_TASK_CSTEMPLATEINTEGRITY_TASK_PURGE_BACKUPS_RETENTION_DAYS_LABEL="Retention window (days)"
PLG_TASK_CSTEMPLATEINTEGRITY_TASK_PURGE_BACKUPS_RETENTION_DAYS_DESC="Backups older than this many days are deleted on each task run. Minimum 1. Default 30. Pick longer if you want a deeper roll-back window on fix-applied changes; pick shorter if database size is the concern."

PLG_TASK_CSTEMPLATEINTEGRITY_TASK_PURGE_BACKUPS_MIN_KEEP_LABEL="Always keep this many most-recent backups"
PLG_TASK_CSTEMPLATEINTEGRITY_TASK_PURGE_BACKUPS_MIN_KEEP_DESC="Safety floor. Even if the retention window has expired, the N most-recent backup rows are never deleted. Useful when a site has a small number of backups all older than the retention window — without a floor the task would wipe the whole roll-back history in one run. Default 5. Set to 0 for no floor."

PLG_TASK_CSTEMPLATEINTEGRITY_TASK_PURGE_BACKUPS_DRY_RUN_LABEL="Dry run"
PLG_TASK_CSTEMPLATEINTEGRITY_TASK_PURGE_BACKUPS_DRY_RUN_DESC="When ON, the task counts what would be deleted and logs it to the Action log, but makes no changes to the backups table. Use this on the first run after changing retention settings to verify the count before letting the task run for real."

; Shim for a Joomla core string that's missing on some 5.x en-GB packs.
; com_scheduler renders this as the "Parameters" tab label on the
; task edit screen. If the core lang pack carries its own value it
; overrides this one — no harm. If the pack is missing the key (as
; on this user's install), the user sees the raw key string instead
; of "Parameters". Shipping the key in this plugin's language file
; resolves it from the global string pool either way.
COM_SCHEDULER_PARAMETERS_FIELDSET_LABEL="Parameters"
